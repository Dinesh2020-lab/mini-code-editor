<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LiveCode – Login</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a120a;
      font-family: 'Rajdhani', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(116, 145, 87, 0.07) 1px, transparent 1px),
        linear-gradient(90deg, rgba(116, 145, 87, 0.07) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    body::after {
      content: '';
      position: fixed;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(116,145,87,0.12) 0%, transparent 70%);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      animation: pulse 4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.5; transform: translate(-50%,-50%) scale(1); }
      50% { opacity: 1; transform: translate(-50%,-50%) scale(1.1); }
    }

    .card {
      position: relative;
      width: 420px;
      background: rgba(10, 25, 10, 0.85);
      border: 1px solid rgba(116,145,87,0.35);
      padding: 44px 40px 36px;
      backdrop-filter: blur(12px);
      box-shadow: 0 0 60px rgba(116,145,87,0.08), inset 0 1px 0 rgba(116,145,87,0.15);
      animation: slideIn 0.6s cubic-bezier(.22,.8,.44,1) both;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card::before, .card::after {
      content: '';
      position: absolute;
      width: 14px; height: 14px;
      border-color: #749157d1;
      border-style: solid;
    }
    .card::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
    .card::after  { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 32px;
    }

    .logo-icon {
      width: 36px; height: 36px;
      border: 1.5px solid #749157d1;
      display: flex; align-items: center; justify-content: center;
    }

    .logo-icon::before {
      content: '</>';
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      color: #8fb86a;
    }

    .logo-text {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #c8dbb0;
    }

    .logo-text span { color: #749157d1; }

    h2 {
      font-size: 28px;
      font-weight: 700;
      color: #ddeece;
      letter-spacing: 1px;
      margin-bottom: 4px;
    }

    .subtitle {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      color: rgba(116,145,87,0.6);
      letter-spacing: 2px;
      margin-bottom: 32px;
    }

    .field {
      margin-bottom: 18px;
      position: relative;
    }

    label {
      display: block;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(116,145,87,0.8);
      margin-bottom: 7px;
      font-weight: 600;
    }

    .input-wrap { position: relative; }

    .input-wrap i {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(116,145,87,0.5);
      font-size: 14px;
      pointer-events: none;
      transition: color 0.2s;
    }

    input {
      width: 100%;
      background: rgba(116,145,87,0.06);
      border: 1px solid rgba(116,145,87,0.2);
      color: #c8dbb0;
      font-family: 'Share Tech Mono', monospace;
      font-size: 14px;
      padding: 12px 14px 12px 42px;
      outline: none;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
      letter-spacing: 0.5px;
    }

    input::placeholder { color: rgba(116,145,87,0.3); }

    input:focus {
      border-color: rgba(116,145,87,0.7);
      background: rgba(116,145,87,0.1);
      box-shadow: 0 0 0 3px rgba(116,145,87,0.08);
    }

    .input-wrap:focus-within i { color: #8fb86a; }

    .forgot {
      display: block;
      text-align: right;
      font-size: 11px;
      letter-spacing: 1.5px;
      color: rgba(116,145,87,0.55);
      text-decoration: none;
      text-transform: uppercase;
      margin-top: -10px;
      margin-bottom: 18px;
      transition: color 0.2s;
      cursor: pointer;
      font-weight: 600;
    }

    .forgot:hover { color: #8fb86a; }

    .btn {
      width: 100%;
      padding: 14px;
      background: rgba(116,145,87,0.15);
      border: 1px solid rgba(116,145,87,0.5);
      color: #c8dbb0;
      font-family: 'Rajdhani', sans-serif;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 4px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.25s;
      position: relative;
      overflow: hidden;
      margin-top: 8px;
    }

    .btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(116,145,87,0.12), transparent);
      transform: translateX(-100%);
      transition: transform 0.4s;
    }

    .btn:hover::before { transform: translateX(100%); }

    .btn:hover {
      border-color: rgba(116,145,87,0.9);
      color: #fff;
      box-shadow: 0 0 20px rgba(116,145,87,0.2);
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 22px 0;
      color: rgba(116,145,87,0.3);
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      letter-spacing: 2px;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(116,145,87,0.15);
    }

    .register {
      text-align: center;
      font-size: 12px;
      letter-spacing: 1px;
      color: rgba(116,145,87,0.45);
    }

    .register a {
      color: #8fb86a;
      text-decoration: none;
      font-weight: 700;
      cursor: pointer;
      transition: color 0.2s;
    }

    .register a:hover { color: #c8dbb0; }

    .forgot-panel {
      display: none;
      animation: slideIn 0.4s ease both;
    }

    .back-btn {
      background: none;
      border: none;
      color: rgba(116,145,87,0.6);
      font-family: 'Rajdhani', sans-serif;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      padding: 0;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: color 0.2s;
      font-weight: 600;
    }

    .back-btn:hover { color: #8fb86a; }
    .back-btn::before { content: '←'; }

    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(60px);
      background: rgba(10,25,10,0.95);
      border: 1px solid rgba(116,145,87,0.4);
      color: #c8dbb0;
      font-family: 'Share Tech Mono', monospace;
      font-size: 12px;
      padding: 12px 24px;
      letter-spacing: 1px;
      transition: transform 0.3s ease;
      z-index: 100;
    }

    .toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<div class="card">

  <!-- LOGIN PANEL -->
  <div id="loginPanel">
    <div class="logo">
      <div class="logo-icon"></div>
      <div class="logo-text">Live<span>Code</span></div>
    </div>

    <h2>Sign In</h2>
    <p class="subtitle">// AUTHENTICATE TO CONTINUE</p>

    <div class="field">
      <label>Full Name</label>
      <div class="input-wrap">
        <i class="fa-solid fa-user"></i>
        <input type="text" placeholder="john_doe" />
      </div>
    </div>

    <div class="field">
      <label>Email Address</label>
      <div class="input-wrap">
        <i class="fa-solid fa-envelope"></i>
        <input type="email" placeholder="dev@example.com" />
      </div>
    </div>

    <a class="forgot" onclick="showForgot()">Forgot Password?</a>

    <button class="btn" onclick="showToast('✓ ACCESS GRANTED')">EXECUTE LOGIN</button>

    <div class="divider">OR</div>

    <p class="register">No account? <a href="#">Register here</a></p>
  </div>

  <!-- FORGOT PASSWORD PANEL -->
  <div id="forgotPanel" class="forgot-panel">
    <div class="logo">
      <div class="logo-icon"></div>
      <div class="logo-text">Live<span>Code</span></div>
    </div>

    <button class="back-btn" onclick="showLogin()">Back to Login</button>

    <h2>Reset</h2>
    <p class="subtitle">// RECOVER ACCESS</p>

    <div class="field">
      <label>Email Address</label>
      <div class="input-wrap">
        <i class="fa-solid fa-envelope"></i>
        <input type="email" placeholder="dev@example.com" />
      </div>
    </div>

    <button class="btn" onclick="showToast('✓ RESET LINK SENT')">SEND RESET LINK</button>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
  function showForgot() {
    document.getElementById('loginPanel').style.display = 'none';
    const fp = document.getElementById('forgotPanel');
    fp.style.display = 'block';
    fp.style.animation = 'none';
    void fp.offsetWidth;
    fp.style.animation = 'slideIn 0.4s ease both';
  }

  function showLogin() {
    document.getElementById('forgotPanel').style.display = 'none';
    const lp = document.getElementById('loginPanel');
    lp.style.display = 'block';
    lp.style.animation = 'none';
    void lp.offsetWidth;
    lp.style.animation = 'slideIn 0.4s ease both';
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2800);
  }
</script>
</body>
</html>
